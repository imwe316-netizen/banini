<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>비니비니 공구방 - 매주 공동구매 플랫폼</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>

<body>
    <div class="app">
        <header class="header">
            <div class="container header-inner">
                <div class="brand"><span>비니비니 공구방</span></div>
                <div class="toggle-group">
                    <a href="index.html" id="toggle-public" class="toggle-btn active">일반 페이지</a>
                    <a href="admin.html" id="toggle-admin" class="toggle-btn">관리자 페이지</a>
                </div>
            </div>
        </header>

        <div id="public-page" class="page">
            <div class="notice-banner">
                <div class="container">
                    <strong>매주 수요일 00:00 ~ 토요일 23:59 (KST) 접수</strong>
                    <span class="kst-clock" id="kst-time">-</span>
                </div>
            </div>
            <nav class="subnav container">
                <button data-tab="active" class="subnav-btn active">진행중 공구</button>
                <button data-tab="past" class="subnav-btn">지난 공구</button>
            </nav>
            <section id="public-active" class="container"></section>
            <section id="public-past" class="container" hidden>
                <div style="margin-top:24px">
                    <h2 class="section-title">지난 공동구매</h2>
                    <div class="past-grid" id="pastCardsGrid"></div>
                </div>
            </section>
        </div>

        <footer class="footer">© 2026 비니비니 공구방 • 매주 공동구매 플랫폼</footer>
    </div>

    <div id="purchaseModal" class="modal">
        <div class="modal-content">
            <div class="modal-head">
                <h3 style="margin:0;font-weight:800;font-size:20px">구매하기</h3>
                <button class="close-btn" onclick="closePurchaseModal()">×</button>
            </div>
            <form id="orderForm">
                <div class="modal-body form-grid">
                    <div class="form-grid two">
                        <div class="form-field">
                            <label class="form-label">이름 *</label>
                            <input class="form-input" name="name" required placeholder="홍길동">
                        </div>
                        <div class="form-field">
                            <label class="form-label">연락처 *</label>
                            <input class="form-input" name="phone" required placeholder="010-0000-0000">
                        </div>
                    </div>
                    <div class="form-field">
                        <label class="form-label">주소 *</label>
                        <input class="form-input" name="address" required placeholder="서울시 강남구 테헤란로">
                    </div>
                    <div class="form-grid two">
                        <div class="form-field">
                            <label class="form-label">수량 *</label>
                            <input class="form-input" name="qty" type="number" min="1" value="1" required>
                        </div>
                        <div class="form-field">
                            <label class="form-label">입금자명 *</label>
                            <input class="form-input" name="depositor" required placeholder="통장에 표시될 이름">
                        </div>
                    </div>
                </div>
                <div class="modal-foot">
                    <button type="button" class="btn-secondary" onclick="closePurchaseModal()">취소</button>
                    <button type="submit" class="btn-primary">주문 확정</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>
</body>

</html>
